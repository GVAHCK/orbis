<!-- Micro-interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            const glows = document.querySelectorAll('.animate-subtle-glow');
            glows.forEach((glow, index) => {
                const multiplier = index === 0 ? 1 : -1;
                glow.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });

        // Toggle Password Visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('input[type="password"]');
        if (togglePass && passInput) {
            togglePass.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                togglePass.innerHTML = `<span class="material-symbols-outlined text-[20px]">${isPass ? 'visibility_off' : 'visibility'}</span>`;
            });
        }
    </script>
